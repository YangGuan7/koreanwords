<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🥫ㄉ單字卡</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./Content/style.css">
</head>
<body>

  <div class="app-container">
    <header>
      <h1><i class="fa-solid fa-star star-blink"></i> 🥫ㄉ單字卡 <i class="fa-solid fa-star star-blink"></i></h1>
    </header>

    <main class="quiz-container">
      
      <div class="overlay-welcome" id="welcomeScreen">
        <div class="welcome-box">
          <div class="welcome-icon">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
          </div>
          <h2>🥫の單字遊戲</h2>
          <p>⬅️不熟、⬇️不確定、➡️熟悉</p>
          
          <div class="filter-container" style="margin-bottom: 20px;">
            <select id="themeSelect" style="padding: 10px 15px; border-radius: 20px; border: 2px solid #ffde6a; font-family: inherit; font-size: 16px; outline: none; width: 85%; cursor: pointer;">
              <option value="all">🌈 全部主題混搭</option>
              <option value="空間狀態">🏢 空間狀態 (形容詞)</option>
              <option value="對比形容">⚖️ 對比形容 (形容詞)</option>
              <option value="居家日常">🏠 居家日常 (動作)</option>
              <option value="日常作息">⏰ 日常作息 (動作)</option>
              <option value="身體部位">💪 身體部位 (名詞)</option>
              <option value="日常物品">🎒 日常物品 (名詞)</option>
              <option value="日常場所">🏥 日常場所 (名詞)</option>
            </select>
          </div>
          
          <button id="startBtn" class="btn-primary">
            斯搭豆<i class="fa-solid fa-ghost"></i>
          </button>
        </div>
      </div>

      <div class="card-wrapper">
        <div class="card hide" id="flashCard">
          <button id="ttsBtn" class="tts-btn" aria-label="發音">
            <i class="fa-solid fa-volume-high"></i>
          </button>

          <div class="card-overlay overlay-known"><i class="fa-regular fa-circle"></i></div>
          <div class="card-overlay overlay-weak"><i class="fa-solid fa-xmark"></i></div>
          <div class="card-overlay overlay-unsure"><i class="fa-solid fa-triangle-exclamation"></i></div>

          <div class="cardInner">
            <div class="cardFace cardFront">
              <div class="word-tag" id="frontTag"></div>
              <div class="word-text" id="frontWord">中文</div>
              <div class="tap-hint">★ 點擊翻面 ★</div>
            </div>
            <div class="cardFace cardBack">
              <div class="word-text" id="backWord">KR</div>
              <div class="word-stats" id="backStats"></div>
              <div class="tap-hint">★ 點擊翻回 ★</div>
            </div>
          </div>
        </div>
      </div>

      <div class="action-hints">
        <span class="hint-item left"><i class="fa-solid fa-arrow-left"></i> 不熟</span>
        <span class="hint-item down"><i class="fa-solid fa-arrow-down"></i> 不確定</span>
        <span class="hint-item right">熟悉 <i class="fa-solid fa-arrow-right"></i></span>
      </div>
      <button id="resetBtn">清空進度</button>

    </main>
  </div>

  <script type="module" src="./js/firebase.js"></script>
  <script type="module" src="./js/pushData.js"></script>
  <script type="module" src="./js/quiz.js"></script>
  <script type="module" src="./js/script.js"></script>
</body>
</html>
