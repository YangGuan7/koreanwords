<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";  // 引入 Firestore
      
        // Your web app's Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyCdsh_YEEnd9wg0KFmwUZoSRFwHpC71eWI",
          authDomain: "koreanwords-6806a.firebaseapp.com",
          projectId: "koreanwords-6806a",
          storageBucket: "koreanwords-6806a.firebasestorage.app",
          messagingSenderId: "904220840251",
          appId: "1:904220840251:web:9671cd1854116f2227a71e",
          measurementId: "G-7H7K5C6VYF"
        };
      
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);  // 初始化 Firestore
      
        // 儲存單字到 Firestore
        async function saveWord() {
          const word = document.getElementById("word").value;
          if (word) {
            try {
              // 將單字儲存到 Firestore 的 'words' 集合
              await addDoc(collection(db, "words"), {
                word: word,
                timestamp: new Date()
              });
              alert("單字已儲存！");
            } catch (e) {
              alert("儲存錯誤：" + e);
            }
          }
        }
      </script>
</head>

<body>
    <h1>新增單字</h1>
<input type="text" id="word" placeholder="輸入單字">
<button onclick="saveWord()">儲存單字</button>


<div id="wordQuiz"></div>

<script>
  const words = [
    { korean: "보다", chinese: "看" },
    { korean: "먹다", chinese: "吃" },
    { korean: "가다", chinese: "去" },
    { korean: "오다", chinese: "來" },
    { korean: "마시다", chinese: "喝" },
    { korean: "공부하다", chinese: "念書" },
    { korean: "배우다", chinese: "學" },
    { korean: "자다", chinese: "睡覺" }
  ];

  let currentQuestion = {};

  function getRandomOptions(correct, count = 4) {
    const options = [correct];
    while (options.length < count) {
      const random = words[Math.floor(Math.random() * words.length)];
      if (!options.includes(random.chinese)) {
        options.push(random.chinese);
      }
    }
    return options.sort(() => Math.random() - 0.5);
  }

  function showWordQuiz() {
    const randomWord = words[Math.floor(Math.random() * words.length)];
    currentQuestion = randomWord;

    const options = getRandomOptions(randomWord.chinese);
    const quizDiv = document.getElementById("wordQuiz");
    quizDiv.innerHTML = `
      <h3>「${randomWord.korean}」 是什麼意思？</h3>
      ${options.map(opt => `<button class="btn" onclick="checkWordAnswer('${opt}')">${opt}</button>`).join('')}
      <p id="wordResult"></p>
      <button onclick="showWordQuiz()">下一題</button>
    `;
  }

  function checkWordAnswer(selected) {
    const correct = currentQuestion.chinese;
    document.getElementById("wordResult").textContent = selected === correct
      ? "✅ 答對了！"
      : `❌ 正確答案是 ${correct}`;
  }

  showWordQuiz();
</script>

</body>
</html>
